services:
  # Base de datos PostgreSQL usada por el backend.
  db:
    image: postgres:15-alpine
    container_name: duckies_postgres_db
    restart: always
    environment:
      POSTGRES_DB: duckies_arena_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ducky_secret_pass123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Interfaz grafica para administrar PostgreSQL.
  pgadmin:
    image: dpage/pgadmin4
    container_name: duckies_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@duckies.com
      PGADMIN_DEFAULT_PASSWORD: admin_password
    ports:
      - "8080:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./docker/pgadmin/servers.json:/pgadmin4/servers.json:ro
    depends_on:
      - db

volumes:
  postgres_data:
  pgadmin_data:
